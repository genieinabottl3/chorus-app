<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chorus</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f7f7f5;
    --card: #ffffff;
    --border: #e5e3df;
    --text: #2b2926;
    --text-dim: #7a766f;
    --accent: #c96f4a;
    --accent-light: #f3e2da;
    --green: #4c8c6b;
    --green-light: #e2f0e8;
    --red: #b0453a;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 6px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 980px; margin: 0 auto; padding: 20px 20px 60px; }

  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }
  header.top h1 { font-size: 20px; margin: 0; font-weight: 650; }
  header.top .date { font-size: 13px; color: var(--text-dim); }
  header.top .tagline { font-size: 11.5px; color: var(--text-dim); font-weight: 500; margin-top: 1px; }

  .tabs {
    display: flex;
    gap: 4px;
    background: #ece9e4;
    padding: 4px;
    border-radius: 10px;
    width: fit-content;
    margin-bottom: 14px;
  }
  .tabs button {
    border: none;
    background: transparent;
    padding: 7px 16px;
    border-radius: 7px;
    font-size: 13.5px;
    font-weight: 550;
    color: var(--text-dim);
    cursor: pointer;
  }
  .tabs button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .tagbar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid transparent;
    opacity: 0.55;
    user-select: none;
    white-space: nowrap;
  }
  .tag-chip.active { opacity: 1; border-color: currentColor; }
  .tag-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .tag-chip.all { color: var(--text); background: #ece9e4; opacity: 1; }
  .tag-chip.all.active { border-color: var(--text); }

  button.primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button.primary:hover { filter: brightness(1.05); }

  /* Today view */
  .today-list { display: flex; flex-direction: column; gap: 8px; }
  .today-empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .chore-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
  }
  .chore-row.done { opacity: 0.5; }
  .check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #cfcac1;
    flex: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 13px;
    margin-top: 1px;
  }
  .check.checked { background: var(--green); border-color: var(--green); }
  .chore-main { flex: 1; min-width: 0; }
  .chore-name-row { display: flex; align-items: center; gap: 6px; }
  .chore-name { font-size: 14.5px; font-weight: 550; }
  .chore-row.done .chore-name { text-decoration: line-through; }
  .chore-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chore-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
  .mini-tag {
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .freq-label { font-size: 11.5px; color: var(--text-dim); }
  .due-label { font-size: 11.5px; color: var(--text-dim); font-weight: 600; }
  .due-label.overdue { color: var(--red); }
  .streak { font-size: 11.5px; color: var(--accent); font-weight: 650; }
  .row-actions { display: flex; gap: 4px; }
  .icon-btn {
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 4px 6px;
    border-radius: 6px;
  }
  .icon-btn:hover { background: #f0ede8; }
  .expand-toggle {
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 4px;
  }
  .task-timestamps { font-size: 10.5px; color: var(--text-dim); margin-top: 4px; }
  .subtask-badge {
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-dim);
    background: #ece9e4;
    border-radius: 999px;
    padding: 1px 7px;
  }

  /* Subtask tree (inline, read/toggle only) */
  .subtask-tree { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .subtask-row { display: flex; align-items: center; gap: 7px; }
  .subtask-row.child { margin-left: 24px; }
  .mini-check {
    width: 16px; height: 16px;
    border-radius: 5px;
    border: 1.5px solid #cfcac1;
    flex: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 10px;
  }
  .mini-check.checked { background: var(--green); border-color: var(--green); }
  .subtask-name { font-size: 12.5px; }
  .subtask-name.done { text-decoration: line-through; color: var(--text-dim); }

  /* Board view */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .column {
    background: #f0ede7;
    border-radius: var(--radius);
    padding: 10px;
    min-height: 200px;
  }
  .column h3 {
    font-size: 12.5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-dim);
    margin: 4px 6px 10px;
    display: flex;
    justify-content: space-between;
  }
  .column .count {
    background: #ddd8d0;
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 11px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 11px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    cursor: grab;
  }
  .card.dragging { opacity: 0.4; }
  .card .chore-name { font-size: 13.5px; }
  .card .chore-meta { margin-top: 7px; }
  .col-drop-hint {
    border: 2px dashed #cfcac1;
    border-radius: 8px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 14px 6px;
  }

  /* Calendar view */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-header .cal-title { font-size: 15px; font-weight: 650; }
  .cal-nav { display: flex; gap: 6px; align-items: center; }
  .cal-nav button {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 7px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 13px;
  }
  .cal-nav .today-jump {
    width: auto;
    padding: 0 10px;
    font-size: 12px;
    font-weight: 600;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .cal-dow {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    padding-bottom: 4px;
  }
  .cal-day {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 74px;
    padding: 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .cal-day.outside { opacity: 0.35; }
  .cal-day.today { border-color: var(--accent); box-shadow: 0 0 0 1.5px var(--accent) inset; }
  .cal-day.selected { background: var(--accent-light); }
  .cal-daynum { font-size: 12px; font-weight: 650; }
  .cal-dots { display: flex; flex-wrap: wrap; gap: 3px; }
  .cal-dot { width: 7px; height: 7px; border-radius: 50%; }
  .cal-more { font-size: 10px; color: var(--text-dim); }
  .day-panel {
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .day-panel h4 { margin: 0 0 10px; font-size: 13.5px; }
  .day-panel .today-empty { padding: 20px; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(30,28,25,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    width: 440px;
    max-width: 92vw;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
  }
  .modal h2 { font-size: 16px; margin: 0 0 14px; }
  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; font-weight: 650; color: var(--text-dim); margin-bottom: 5px; }
  .field input[type=text], .field input[type=date], .field select, .field textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13.5px;
    background: #fdfdfc;
    font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 44px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .type-toggle { display: flex; gap: 6px; }
  .type-toggle button {
    flex: 1;
    padding: 8px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: #fdfdfc;
    font-size: 13px;
    cursor: pointer;
    font-weight: 550;
  }
  .type-toggle button.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .weekday-picker { display: flex; gap: 4px; flex-wrap: wrap; }
  .weekday-picker button {
    width: 34px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fdfdfc;
    font-size: 11.5px;
    cursor: pointer;
  }
  .weekday-picker button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .tag-input-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .tag-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px 3px 9px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .tag-pill button { border: none; background: none; cursor: pointer; color: inherit; font-size: 12px; opacity: 0.7; }
  .tag-suggestions { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .tag-suggestions .tag-chip { opacity: 0.9; }
  .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .modal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
  .link-btn { background: none; border: none; color: #b0453a; font-size: 12.5px; cursor: pointer; font-weight: 600; }
  .btn-group { display: flex; gap: 8px; }
  button.secondary {
    background: #fdfdfc;
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* Modal subtask editor */
  .st-editor { display: flex; flex-direction: column; gap: 5px; }
  .st-row { display: flex; align-items: center; gap: 6px; }
  .st-row.child { margin-left: 26px; }
  .st-name-edit { flex: 1; font-size: 13px; }
  .st-row button.icon-btn { padding: 3px 5px; font-size: 12px; }
  .st-child-add { margin-left: 26px; display: flex; gap: 6px; }
  .st-child-add input {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12.5px;
  }
  .st-add-row { display: flex; gap: 6px; margin-top: 4px; }
  .st-add-row input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
  }

  @media (max-width: 700px) {
    .board { grid-template-columns: 1fr; }
    .cal-day { min-height: 56px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <h1>🏡 Chorus</h1>
      <div class="tagline">Your chores, on us</div>
    </div>
    <div class="date" id="todayLabel"></div>
  </header>

  <div class="tabs">
    <button id="tabToday" class="active">Today</button>
    <button id="tabBoard">Board</button>
    <button id="tabCalendar">Calendar</button>
  </div>

  <div class="toolbar">
    <div class="tagbar" id="tagbar"></div>
    <button class="primary" id="addBtn">+ Add task</button>
  </div>

  <div id="todayView"></div>
  <div id="boardView" style="display:none"></div>
  <div id="calendarView" style="display:none"></div>
</div>

<div id="modalRoot"></div>

<script>
(function(){
  const STORAGE_KEY = 'chores_app_state_v3';
  const OLD_KEYS = ['chores_app_state_v2', 'chores_app_state_v1'];
  const PALETTE = ['#c96f4a','#4c8c6b','#4a7fc9','#a45ac9','#c9a24a','#c94a6f','#4ac9b0','#7a766f'];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function loadState(){
    try {
      let raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { for (const k of OLD_KEYS) { raw = localStorage.getItem(k); if (raw) break; } }
      if (raw) {
        const parsed = JSON.parse(raw);
        const now = new Date();
        if (parsed.calendarYear === undefined) parsed.calendarYear = now.getFullYear();
        if (parsed.calendarMonth === undefined) parsed.calendarMonth = now.getMonth();
        if (!parsed.selectedDate) parsed.selectedDate = fmtDate(now);
        if (!parsed.expandedTasks) parsed.expandedTasks = [];
        (parsed.tasks||[]).forEach(t => {
          if (t.description === undefined) t.description = '';
          if (!t.subtasks) t.subtasks = [];
          if (!t.updatedAt) t.updatedAt = t.createdAt || Date.now();
          if (t.type === 'adhoc' && t.completedAt === undefined) t.completedAt = (t.column === 'done') ? t.updatedAt : null;
        });
        return parsed;
      }
    } catch(e){ console.warn('load failed', e); }
    return defaultState();
  }

  function genId(prefix){ return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

  function defaultState(){
    const now = Date.now();
    const today = new Date();
    return {
      tasks: [
        { id: 'demo1', name: 'Wash dishes', description: '', tags: ['chores'], type: 'recurring', recurrence: { freq: 'daily' }, completedDates: [], subtasks: [], createdAt: now, updatedAt: now },
        { id: 'demo2', name: 'Take bins out', description: '', tags: ['chores'], type: 'recurring', recurrence: { freq: 'weekly', weekdays: [2] }, completedDates: [], subtasks: [], createdAt: now, updatedAt: now },
        { id: 'demo3', name: 'Pack nursery bag', description: '', tags: ['baby'], type: 'recurring', recurrence: { freq: 'daily' }, completedDates: [], subtasks: [], createdAt: now, updatedAt: now },
        { id: 'demo4', name: 'Submit expense report', description: 'Include the taxi receipts from the client visit.', tags: ['office'], type: 'adhoc', column: 'todo', dueDate: null, completedAt: null, subtasks: [], createdAt: now, updatedAt: now },
        { id: 'demo5', name: 'Declutter garage', description: 'Sort into keep / charity / tip before the weekend skip arrives.', tags: ['chores'], type: 'adhoc', column: 'doing', dueDate: null, completedAt: null, createdAt: now, updatedAt: now, subtasks: [
          { id: 'sub1', name: 'Move car out', done: false, children: [
            { id: 'sub1a', name: 'Make space on drive', done: false }
          ] },
          { id: 'sub2', name: 'Sort shelving', done: false, children: [] }
        ] }
      ],
      activeTag: 'all',
      view: 'today',
      calendarYear: today.getFullYear(),
      calendarMonth: today.getMonth(),
      selectedDate: fmtDate(today),
      expandedTasks: []
    };
  }

  let state = loadState();

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function fmtDate(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function parseDate(str){
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function todayStr(){ return fmtDate(new Date()); }

  function isDueOnDate(task, dateObj){
    if (task.type !== 'recurring') return false;
    const r = task.recurrence || {};
    if (r.freq === 'daily') return true;
    if (r.freq === 'weekly') return (r.weekdays||[]).includes(dateObj.getDay());
    if (r.freq === 'monthly') return dateObj.getDate() === (r.dayOfMonth || 1);
    if (r.freq === 'yearly') return (dateObj.getMonth()+1) === (r.month||1) && dateObj.getDate() === (r.day||1);
    return false;
  }
  function isDueToday(task){ return isDueOnDate(task, new Date()); }
  function isCompletedOn(task, dateKey){ return (task.completedDates||[]).includes(dateKey); }
  function isCompletedToday(task){ return isCompletedOn(task, todayStr()); }
  function toggleCompletion(task, dateKey){
    task.completedDates = task.completedDates || [];
    const idx = task.completedDates.indexOf(dateKey);
    if (idx >= 0) task.completedDates.splice(idx,1);
    else task.completedDates.push(dateKey);
    save();
  }
  function computeStreak(task){
    let streak = 0;
    let cursor = new Date();
    const dates = new Set(task.completedDates||[]);
    while (true) {
      const key = fmtDate(cursor);
      if (dates.has(key)) { streak++; cursor.setDate(cursor.getDate() - 1); } else break;
    }
    return streak;
  }

  function formatDateShort(ts){
    return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }
  function formatRelative(ts){
    const diffMs = Date.now() - ts;
    const min = Math.floor(diffMs / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return min + 'm ago';
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + 'h ago';
    const day = Math.floor(hr / 24);
    if (day < 7) return day + 'd ago';
    return formatDateShort(ts);
  }
  function durationLabel(startTs, endTs){
    const days = Math.max(0, Math.round((endTs - startTs) / 86400000));
    if (days === 0) return 'same day';
    if (days === 1) return '1 day';
    return days + ' days';
  }

  function allTags(){
    const set = new Set();
    state.tasks.forEach(t => (t.tags||[]).forEach(tag => set.add(tag)));
    return Array.from(set).sort();
  }
  function tagColor(tag){
    let hash = 0;
    for (let i=0;i<tag.length;i++) hash = tag.charCodeAt(i) + ((hash << 5) - hash);
    return PALETTE[Math.abs(hash) % PALETTE.length];
  }
  function taskMatchesFilter(task){
    if (state.activeTag === 'all') return true;
    return (task.tags||[]).includes(state.activeTag);
  }

  function renderTagbar(){
    const bar = document.getElementById('tagbar');
    const tags = allTags();
    let html = `<div class="tag-chip all ${state.activeTag==='all'?'active':''}" data-tag="all">All</div>`;
    tags.forEach(tag => {
      const c = tagColor(tag);
      html += `<div class="tag-chip ${state.activeTag===tag?'active':''}" style="color:${c}; background:${c}22" data-tag="${escapeHtml(tag)}"><span class="dot"></span>${escapeHtml(tag)}</div>`;
    });
    bar.innerHTML = html;
    bar.querySelectorAll('.tag-chip').forEach(el => {
      el.addEventListener('click', () => { state.activeTag = el.dataset.tag; save(); renderAll(); });
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function freqLabel(task){
    const r = task.recurrence || {};
    if (r.freq === 'daily') return 'Every day';
    if (r.freq === 'weekly') return (r.weekdays||[]).map(d=>DOW[d]).join(', ') || 'Weekly';
    if (r.freq === 'monthly') return 'Day ' + (r.dayOfMonth||1) + ' of month';
    if (r.freq === 'yearly') return 'Every ' + MONTH_NAMES[(r.month||1)-1] + ' ' + (r.day||1);
    return '';
  }

  function tagsHtml(task){
    return (task.tags||[]).map(tag => {
      const c = tagColor(tag);
      return `<span class="mini-tag" style="color:${c}; background:${c}22">${escapeHtml(tag)}</span>`;
    }).join('');
  }

  function dueLabelHtml(task){
    if (task.type !== 'adhoc' || !task.dueDate) return '';
    const overdue = task.dueDate < todayStr() && task.column !== 'done';
    const d = parseDate(task.dueDate);
    const label = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    return `<span class="due-label ${overdue?'overdue':''}">${overdue?'Overdue: ':'Due '}${label}</span>`;
  }

  function descHtml(task){
    if (!task.description) return '';
    return `<div class="chore-desc" title="${escapeHtml(task.description)}">${escapeHtml(task.description)}</div>`;
  }

  function timestampsHtml(task){
    if (task.type !== 'adhoc') return '';
    let s = 'Created ' + formatDateShort(task.createdAt);
    if (task.completedAt) s += ' · Done in ' + durationLabel(task.createdAt, task.completedAt);
    return `<div class="task-timestamps">${s}</div>`;
  }

  // ---- Subtasks ----
  function countSubtasks(list){
    let total = 0, done = 0;
    (list||[]).forEach(s => {
      total++; if (s.done) done++;
      if (s.children && s.children.length) {
        const c = countSubtasks(s.children);
        total += c.total; done += c.done;
      }
    });
    return { total, done };
  }

  function subtaskBadgeHtml(task){
    const { total, done } = countSubtasks(task.subtasks);
    if (total === 0) return '';
    return `<span class="subtask-badge">${done}/${total}</span>`;
  }

  function expandToggleHtml(task){
    const { total } = countSubtasks(task.subtasks);
    if (total === 0) return '';
    const expanded = state.expandedTasks.includes(task.id);
    return `<button class="expand-toggle" data-action="expand" data-task="${task.id}">${expanded ? '▾' : '▸'}</button>`;
  }

  function inlineSubtaskTreeHtml(task){
    if (!state.expandedTasks.includes(task.id)) return '';
    const { total } = countSubtasks(task.subtasks);
    if (total === 0) return '';
    let html = '<div class="subtask-tree">';
    (task.subtasks||[]).forEach(sub => {
      html += `<div class="subtask-row">
        <span class="mini-check ${sub.done?'checked':''}" data-action="toggle-sub" data-task="${task.id}" data-sub="${sub.id}">${sub.done?'✓':''}</span>
        <span class="subtask-name ${sub.done?'done':''}">${escapeHtml(sub.name)}</span>
      </div>`;
      (sub.children||[]).forEach(child => {
        html += `<div class="subtask-row child">
          <span class="mini-check ${child.done?'checked':''}" data-action="toggle-sub" data-task="${task.id}" data-sub="${sub.id}" data-child="${child.id}">${child.done?'✓':''}</span>
          <span class="subtask-name ${child.done?'done':''}">${escapeHtml(child.name)}</span>
        </div>`;
      });
    });
    html += '</div>';
    return html;
  }

  function bindSubtaskToggles(container, onDone){
    container.querySelectorAll('[data-action="expand"]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = el.dataset.task;
        const idx = state.expandedTasks.indexOf(id);
        if (idx >= 0) state.expandedTasks.splice(idx,1); else state.expandedTasks.push(id);
        save();
        onDone();
      });
    });
    container.querySelectorAll('[data-action="toggle-sub"]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const task = state.tasks.find(t => t.id === el.dataset.task);
        const sub = (task.subtasks||[]).find(s => s.id === el.dataset.sub);
        if (!sub) return;
        if (el.dataset.child) {
          const child = (sub.children||[]).find(c => c.id === el.dataset.child);
          if (child) child.done = !child.done;
        } else {
          sub.done = !sub.done;
        }
        save();
        onDone();
      });
    });
  }

  function renderToday(){
    const container = document.getElementById('todayView');
    const due = state.tasks.filter(t => t.type === 'recurring' && isDueToday(t) && taskMatchesFilter(t));
    if (due.length === 0) {
      container.innerHTML = `<div class="today-empty">Nothing due today${state.activeTag!=='all' ? ' for "'+escapeHtml(state.activeTag)+'"' : ''}. 🎉</div>`;
      return;
    }
    due.sort((a,b) => isCompletedToday(a) - isCompletedToday(b));
    let html = '<div class="today-list">';
    due.forEach(task => {
      const done = isCompletedToday(task);
      const streak = computeStreak(task);
      html += `
        <div class="chore-row ${done?'done':''}" data-id="${task.id}">
          <div class="check ${done?'checked':''}" data-action="toggle" data-id="${task.id}">${done?'✓':''}</div>
          <div class="chore-main">
            <div class="chore-name-row">
              <div class="chore-name">${escapeHtml(task.name)}</div>
              ${expandToggleHtml(task)}
              ${subtaskBadgeHtml(task)}
            </div>
            ${descHtml(task)}
            <div class="chore-meta">
              ${tagsHtml(task)}
              <span class="freq-label">${freqLabel(task)}</span>
              ${streak > 1 ? `<span class="streak">🔥 ${streak}d</span>` : ''}
            </div>
            ${inlineSubtaskTreeHtml(task)}
          </div>
          <div class="row-actions">
            <button class="icon-btn" data-action="edit" data-id="${task.id}">✎</button>
          </div>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;

    container.querySelectorAll('[data-action="toggle"]').forEach(el => {
      el.addEventListener('click', () => {
        const task = state.tasks.find(t => t.id === el.dataset.id);
        toggleCompletion(task, todayStr());
        renderToday();
      });
    });
    container.querySelectorAll('[data-action="edit"]').forEach(el => {
      el.addEventListener('click', () => openModal(state.tasks.find(t => t.id === el.dataset.id)));
    });
    bindSubtaskToggles(container, renderToday);
  }

  const COLUMNS = [
    { key: 'todo', label: 'To do' },
    { key: 'doing', label: 'In progress' },
    { key: 'done', label: 'Done' }
  ];

  function renderBoard(){
    const container = document.getElementById('boardView');
    const adhoc = state.tasks.filter(t => t.type === 'adhoc' && taskMatchesFilter(t));
    let html = '<div class="board">';
    COLUMNS.forEach(col => {
      const items = adhoc.filter(t => (t.column || 'todo') === col.key);
      html += `<div class="column" data-col="${col.key}">
        <h3>${col.label} <span class="count">${items.length}</span></h3>`;
      if (items.length === 0) {
        html += `<div class="col-drop-hint">Drop here</div>`;
      } else {
        items.forEach(task => {
          html += `<div class="card" draggable="true" data-id="${task.id}">
            <div class="chore-name-row">
              <div class="chore-name">${escapeHtml(task.name)}</div>
              ${expandToggleHtml(task)}
              ${subtaskBadgeHtml(task)}
            </div>
            ${descHtml(task)}
            <div class="chore-meta">${tagsHtml(task)}${dueLabelHtml(task)}</div>
            ${timestampsHtml(task)}
            ${inlineSubtaskTreeHtml(task)}
          </div>`;
        });
      }
      html += `</div>`;
    });
    html += '</div>';
    container.innerHTML = html;

    container.querySelectorAll('.card').forEach(card => {
      card.addEventListener('dragstart', e => {
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', card.dataset.id);
      });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.addEventListener('click', (e) => {
        if (e.target.closest('[data-action]')) return;
        openModal(state.tasks.find(t => t.id === card.dataset.id));
      });
    });
    container.querySelectorAll('.column').forEach(col => {
      col.addEventListener('dragover', e => e.preventDefault());
      col.addEventListener('drop', e => {
        e.preventDefault();
        const id = e.dataTransfer.getData('text/plain');
        const task = state.tasks.find(t => t.id === id);
        if (task) {
          const wasDone = task.column === 'done';
          task.column = col.dataset.col;
          if (task.column === 'done' && !wasDone) task.completedAt = Date.now();
          else if (task.column !== 'done' && wasDone) task.completedAt = null;
          task.updatedAt = Date.now();
          save(); renderBoard();
        }
      });
    });
    bindSubtaskToggles(container, renderBoard);
  }

  // ---- Calendar ----
  function getTasksForDate(dateObj){
    const key = fmtDate(dateObj);
    return state.tasks.filter(t => {
      if (!taskMatchesFilter(t)) return false;
      if (t.type === 'recurring') return isDueOnDate(t, dateObj);
      if (t.type === 'adhoc') return t.dueDate === key;
      return false;
    });
  }

  function renderCalendar(){
    const container = document.getElementById('calendarView');
    const y = state.calendarYear, m = state.calendarMonth;
    const firstOfMonth = new Date(y, m, 1);
    const startOffset = firstOfMonth.getDay();
    const gridStart = new Date(y, m, 1 - startOffset);
    const todayKey = todayStr();

    let html = `
      <div class="cal-header">
        <div class="cal-title">${MONTH_NAMES[m]} ${y}</div>
        <div class="cal-nav">
          <button id="calPrev">‹</button>
          <button class="today-jump" id="calToday">Today</button>
          <button id="calNext">›</button>
        </div>
      </div>
      <div class="cal-grid">
        ${DOW.map(d => `<div class="cal-dow">${d}</div>`).join('')}
    `;

    for (let i = 0; i < 42; i++) {
      const d = new Date(gridStart);
      d.setDate(gridStart.getDate() + i);
      const key = fmtDate(d);
      const outside = d.getMonth() !== m;
      const items = getTasksForDate(d);
      const shown = items.slice(0, 4);
      html += `<div class="cal-day ${outside?'outside':''} ${key===todayKey?'today':''} ${key===state.selectedDate?'selected':''}" data-date="${key}">
        <div class="cal-daynum">${d.getDate()}</div>
        <div class="cal-dots">
          ${shown.map(t => {
            const c = (t.tags && t.tags[0]) ? tagColor(t.tags[0]) : 'var(--text-dim)';
            return `<span class="cal-dot" style="background:${c}"></span>`;
          }).join('')}
        </div>
        ${items.length > 4 ? `<span class="cal-more">+${items.length-4} more</span>` : ''}
      </div>`;
    }
    html += `</div><div class="day-panel" id="dayPanel"></div>`;
    container.innerHTML = html;

    document.getElementById('calPrev').addEventListener('click', () => {
      state.calendarMonth--;
      if (state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear--; }
      save(); renderCalendar();
    });
    document.getElementById('calNext').addEventListener('click', () => {
      state.calendarMonth++;
      if (state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear++; }
      save(); renderCalendar();
    });
    document.getElementById('calToday').addEventListener('click', () => {
      const t = new Date();
      state.calendarMonth = t.getMonth(); state.calendarYear = t.getFullYear(); state.selectedDate = fmtDate(t);
      save(); renderCalendar();
    });
    container.querySelectorAll('.cal-day').forEach(el => {
      el.addEventListener('click', () => { state.selectedDate = el.dataset.date; save(); renderCalendar(); });
    });

    renderDayPanel();
  }

  function renderDayPanel(){
    const panel = document.getElementById('dayPanel');
    if (!panel) return;
    const dateObj = parseDate(state.selectedDate);
    const items = getTasksForDate(dateObj);
    const label = dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    let html = `<h4>${label}</h4>`;
    if (items.length === 0) {
      html += `<div class="today-empty">Nothing due this day.</div>`;
    } else {
      html += '<div class="today-list">';
      items.forEach(task => {
        if (task.type === 'recurring') {
          const done = isCompletedOn(task, state.selectedDate);
          html += `
            <div class="chore-row ${done?'done':''}" data-id="${task.id}">
              <div class="check ${done?'checked':''}" data-action="toggle-day" data-id="${task.id}">${done?'✓':''}</div>
              <div class="chore-main">
                <div class="chore-name-row">
                  <div class="chore-name">${escapeHtml(task.name)}</div>
                  ${expandToggleHtml(task)}
                  ${subtaskBadgeHtml(task)}
                </div>
                ${descHtml(task)}
                <div class="chore-meta">${tagsHtml(task)}<span class="freq-label">${freqLabel(task)}</span></div>
                ${inlineSubtaskTreeHtml(task)}
              </div>
              <div class="row-actions"><button class="icon-btn" data-action="edit" data-id="${task.id}">✎</button></div>
            </div>`;
        } else {
          html += `
            <div class="chore-row" data-id="${task.id}">
              <div class="chore-main">
                <div class="chore-name-row">
                  <div class="chore-name">${escapeHtml(task.name)}</div>
                  ${expandToggleHtml(task)}
                  ${subtaskBadgeHtml(task)}
                </div>
                ${descHtml(task)}
                <div class="chore-meta">${tagsHtml(task)}${dueLabelHtml(task)}<span class="freq-label">${COLUMNS.find(c=>c.key===(task.column||'todo')).label}</span></div>
                ${inlineSubtaskTreeHtml(task)}
              </div>
              <div class="row-actions"><button class="icon-btn" data-action="edit" data-id="${task.id}">✎</button></div>
            </div>`;
        }
      });
      html += '</div>';
    }
    panel.innerHTML = html;
    panel.querySelectorAll('[data-action="toggle-day"]').forEach(el => {
      el.addEventListener('click', () => {
        const task = state.tasks.find(t => t.id === el.dataset.id);
        toggleCompletion(task, state.selectedDate);
        renderDayPanel();
      });
    });
    panel.querySelectorAll('[data-action="edit"]').forEach(el => {
      el.addEventListener('click', () => openModal(state.tasks.find(t => t.id === el.dataset.id)));
    });
    bindSubtaskToggles(panel, renderDayPanel);
  }

  function renderAll(){
    renderTagbar();
    renderToday();
    renderBoard();
    if (document.getElementById('calendarView').style.display !== 'none') renderCalendar();
  }

  // Tabs
  const tabs = {
    today: { btn: 'tabToday', view: 'todayView' },
    board: { btn: 'tabBoard', view: 'boardView' },
    calendar: { btn: 'tabCalendar', view: 'calendarView' }
  };
  function switchTab(name){
    state.view = name;
    Object.keys(tabs).forEach(k => {
      document.getElementById(tabs[k].btn).classList.toggle('active', k === name);
      document.getElementById(tabs[k].view).style.display = (k === name) ? '' : 'none';
    });
    if (name === 'calendar') renderCalendar();
    save();
  }
  document.getElementById('tabToday').addEventListener('click', () => switchTab('today'));
  document.getElementById('tabBoard').addEventListener('click', () => switchTab('board'));
  document.getElementById('tabCalendar').addEventListener('click', () => switchTab('calendar'));
  if (state.view === 'board' || state.view === 'calendar') switchTab(state.view);

  document.getElementById('todayLabel').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });

  // Modal
  let editingId = null;
  let modalTags = [];
  let modalType = 'recurring';
  let modalFreq = 'daily';
  let modalWeekdays = [];
  let modalDayOfMonth = 1;
  let modalYearlyMonth = (new Date()).getMonth()+1;
  let modalYearlyDay = (new Date()).getDate();
  let modalColumn = 'todo';
  let modalDueDate = '';
  let modalSubtasks = [];
  let modalAddChildFor = null;

  function deepCloneSubtasks(list){
    return (list||[]).map(s => ({ id: s.id, name: s.name, done: !!s.done, children: (s.children||[]).map(c => ({ id: c.id, name: c.name, done: !!c.done })) }));
  }

  function openModal(task){
    editingId = task ? task.id : null;
    modalTags = task ? [...(task.tags||[])] : [];
    modalType = task ? task.type : 'recurring';
    modalFreq = task && task.recurrence ? task.recurrence.freq : 'daily';
    modalWeekdays = task && task.recurrence ? [...(task.recurrence.weekdays||[])] : [];
    modalDayOfMonth = task && task.recurrence ? (task.recurrence.dayOfMonth||1) : 1;
    modalYearlyMonth = task && task.recurrence && task.recurrence.month ? task.recurrence.month : (new Date()).getMonth()+1;
    modalYearlyDay = task && task.recurrence && task.recurrence.day ? task.recurrence.day : (new Date()).getDate();
    modalColumn = task ? (task.column || 'todo') : 'todo';
    modalDueDate = task ? (task.dueDate || '') : '';
    modalSubtasks = task ? deepCloneSubtasks(task.subtasks) : [];
    modalAddChildFor = null;
    renderModal(task ? task.name : '', task ? task.description : '');
  }

  function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

  function commitPendingTag(){
    const input = document.getElementById('fTagInput');
    if (!input) return;
    const v = input.value.trim().toLowerCase();
    if (v && !modalTags.includes(v)) { modalTags.push(v); input.value = ''; }
  }

  function metaLine(task){
    const parts = ['Created ' + formatDateShort(task.createdAt)];
    parts.push('Updated ' + formatRelative(task.updatedAt || task.createdAt));
    if (task.type === 'adhoc' && task.completedAt) {
      parts.push('Completed ' + formatDateShort(task.completedAt) + ' (' + durationLabel(task.createdAt, task.completedAt) + ')');
    }
    if (task.type === 'recurring') {
      const n = (task.completedDates||[]).length;
      if (n > 0) {
        const last = task.completedDates.slice().sort().pop();
        parts.push(n + ' time' + (n===1?'':'s') + ' completed, last on ' + formatDateShort(parseDate(last).getTime()));
      }
    }
    return parts.join(' · ');
  }

  function renderModal(nameValue, descValue){
    const existingTags = allTags();
    const html = `
      <div class="overlay" id="overlay">
        <div class="modal">
          <h2>${editingId ? 'Edit task' : 'Add task'}</h2>
          <div class="field">
            <label>Name</label>
            <input type="text" id="fName" value="${escapeHtml(nameValue||'')}" placeholder="e.g. Water the plants">
          </div>
          <div class="field">
            <label>Description <span style="font-weight:400; text-transform:none;">(optional)</span></label>
            <textarea id="fDesc" rows="2" placeholder="A bit more detail...">${escapeHtml(descValue||'')}</textarea>
          </div>
          <div class="field">
            <label>Tags</label>
            <div class="tag-input-row" id="tagRow"></div>
            <input type="text" id="fTagInput" placeholder="Type a tag, press Enter (or just Save)">
            <div class="tag-suggestions" id="tagSuggestions">
              ${existingTags.map(t => `<div class="tag-chip" style="color:${tagColor(t)}; background:${tagColor(t)}22" data-tag="${escapeHtml(t)}"><span class="dot"></span>${escapeHtml(t)}</div>`).join('')}
            </div>
          </div>
          <div class="field">
            <label>Type</label>
            <div class="type-toggle">
              <button id="btnRecurring" class="${modalType==='recurring'?'active':''}">Recurring chore</button>
              <button id="btnAdhoc" class="${modalType==='adhoc'?'active':''}">One-off / multi-day</button>
            </div>
          </div>
          <div id="typeFields"></div>
          <div class="field">
            <label>Subtasks <span style="font-weight:400; text-transform:none;">(up to 2 levels)</span></label>
            <div id="subtaskEditor"></div>
          </div>
          ${editingId ? `<div class="field"><label>Info</label><div class="hint" id="taskMeta"></div></div>` : ''}
          <div class="modal-actions">
            <div>${editingId ? '<button class="link-btn" id="deleteBtn">Delete</button>' : ''}</div>
            <div class="btn-group">
              <button class="secondary" id="cancelBtn">Cancel</button>
              <button class="primary" id="saveBtn">Save</button>
            </div>
          </div>
        </div>
      </div>`;
    document.getElementById('modalRoot').innerHTML = html;
    renderTagRow();
    renderTypeFields();
    renderSubtaskEditor();
    const metaEl = document.getElementById('taskMeta');
    if (metaEl && editingId) {
      const t = state.tasks.find(tk => tk.id === editingId);
      if (t) metaEl.textContent = metaLine(t);
    }

    document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeModal(); });
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('btnRecurring').addEventListener('click', () => { commitPendingTag(); modalType = 'recurring'; renderModal(document.getElementById('fName').value, document.getElementById('fDesc').value); });
    document.getElementById('btnAdhoc').addEventListener('click', () => { commitPendingTag(); modalType = 'adhoc'; renderModal(document.getElementById('fName').value, document.getElementById('fDesc').value); });

    document.getElementById('fTagInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); commitPendingTag(); renderTagRow(); }
    });
    document.getElementById('fTagInput').addEventListener('blur', () => { commitPendingTag(); renderTagRow(); });
    document.querySelectorAll('#tagSuggestions .tag-chip').forEach(el => {
      el.addEventListener('click', () => {
        const tag = el.dataset.tag;
        if (!modalTags.includes(tag)) { modalTags.push(tag); renderTagRow(); }
      });
    });

    if (editingId) {
      document.getElementById('deleteBtn').addEventListener('click', () => {
        state.tasks = state.tasks.filter(t => t.id !== editingId);
        save(); closeModal(); renderAll();
      });
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      commitPendingTag();
      const name = document.getElementById('fName').value.trim();
      if (!name) { document.getElementById('fName').focus(); return; }
      const description = document.getElementById('fDesc').value.trim();
      let task = editingId ? state.tasks.find(t => t.id === editingId) : null;
      if (!task) {
        task = { id: genId('task'), createdAt: Date.now(), completedDates: [] };
        state.tasks.push(task);
      }
      task.name = name;
      task.description = description;
      task.tags = [...modalTags];
      task.type = modalType;
      task.subtasks = deepCloneSubtasks(modalSubtasks);
      task.updatedAt = Date.now();
      if (modalType === 'recurring') {
        task.recurrence = { freq: modalFreq };
        if (modalFreq === 'weekly') task.recurrence.weekdays = [...modalWeekdays];
        if (modalFreq === 'monthly') task.recurrence.dayOfMonth = modalDayOfMonth;
        if (modalFreq === 'yearly') { task.recurrence.month = modalYearlyMonth; task.recurrence.day = modalYearlyDay; }
        delete task.column; delete task.dueDate; delete task.completedAt;
      } else {
        const wasDone = task.column === 'done';
        task.column = modalColumn;
        if (modalColumn === 'done' && !wasDone) task.completedAt = Date.now();
        else if (modalColumn !== 'done' && wasDone) task.completedAt = null;
        task.dueDate = modalDueDate || null;
        delete task.recurrence;
      }
      save(); closeModal(); renderAll();
    });
  }

  function renderTagRow(){
    const row = document.getElementById('tagRow');
    row.innerHTML = modalTags.map(tag => {
      const c = tagColor(tag);
      return `<span class="tag-pill" style="color:${c}; background:${c}22">${escapeHtml(tag)}<button data-tag="${escapeHtml(tag)}">×</button></span>`;
    }).join('');
    row.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => { modalTags = modalTags.filter(t => t !== btn.dataset.tag); renderTagRow(); });
    });
  }

  function renderTypeFields(){
    const el = document.getElementById('typeFields');
    if (modalType === 'recurring') {
      el.innerHTML = `
        <div class="field">
          <label>Frequency</label>
          <select id="fFreq">
            <option value="daily" ${modalFreq==='daily'?'selected':''}>Daily</option>
            <option value="weekly" ${modalFreq==='weekly'?'selected':''}>Weekly</option>
            <option value="monthly" ${modalFreq==='monthly'?'selected':''}>Monthly</option>
            <option value="yearly" ${modalFreq==='yearly'?'selected':''}>Yearly</option>
          </select>
        </div>
        <div id="freqDetail"></div>
      `;
      document.getElementById('fFreq').addEventListener('change', e => { modalFreq = e.target.value; renderFreqDetail(); });
      renderFreqDetail();
    } else {
      el.innerHTML = `
        <div class="field-row">
          <div class="field">
            <label>Starting column</label>
            <select id="fColumn">
              ${COLUMNS.map(c => `<option value="${c.key}" ${modalColumn===c.key?'selected':''}>${c.label}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>Due date</label>
            <input type="date" id="fDueDate" value="${modalDueDate||''}">
          </div>
        </div>
      `;
      document.getElementById('fColumn').addEventListener('change', e => { modalColumn = e.target.value; });
      document.getElementById('fDueDate').addEventListener('change', e => { modalDueDate = e.target.value; });
    }
  }

  function renderFreqDetail(){
    const el = document.getElementById('freqDetail');
    const days = ['S','M','T','W','T','F','S'];
    if (modalFreq === 'weekly') {
      el.innerHTML = `<div class="field"><label>On which days</label>
        <div class="weekday-picker">
          ${days.map((d,i) => `<button data-day="${i}" class="${modalWeekdays.includes(i)?'active':''}">${d}</button>`).join('')}
        </div>
      </div>`;
      el.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          const d = parseInt(btn.dataset.day);
          const idx = modalWeekdays.indexOf(d);
          if (idx >= 0) modalWeekdays.splice(idx,1); else modalWeekdays.push(d);
          renderFreqDetail();
        });
      });
    } else if (modalFreq === 'monthly') {
      el.innerHTML = `<div class="field"><label>Day of month</label>
        <input type="text" id="fDayOfMonth" value="${modalDayOfMonth}"></div>`;
      document.getElementById('fDayOfMonth').addEventListener('input', e => {
        const v = parseInt(e.target.value);
        modalDayOfMonth = isNaN(v) ? 1 : Math.min(31, Math.max(1, v));
      });
    } else if (modalFreq === 'yearly') {
      const yy = (new Date()).getFullYear();
      const seedDate = String(yy) + '-' + String(modalYearlyMonth).padStart(2,'0') + '-' + String(modalYearlyDay).padStart(2,'0');
      el.innerHTML = `<div class="field"><label>Due date</label>
        <input type="date" id="fYearlyDate" value="${seedDate}">
        <div class="hint">The year is ignored — this repeats every ${MONTH_NAMES[modalYearlyMonth-1]} ${modalYearlyDay}.</div>
      </div>`;
      document.getElementById('fYearlyDate').addEventListener('change', e => {
        if (!e.target.value) return;
        const [y,m,d] = e.target.value.split('-').map(Number);
        modalYearlyMonth = m; modalYearlyDay = d;
        renderFreqDetail();
      });
    } else {
      el.innerHTML = '';
    }
  }

  // Subtask editor inside modal (up to 2 levels: subtask -> child, no deeper)
  function renderSubtaskEditor(){
    const el = document.getElementById('subtaskEditor');
    let html = '<div class="st-editor">';
    modalSubtasks.forEach(sub => {
      html += `
        <div class="st-row">
          <span class="mini-check ${sub.done?'checked':''}" data-action="st-toggle" data-sub="${sub.id}">${sub.done?'✓':''}</span>
          <span class="st-name-edit ${sub.done?'subtask-name done':''}">${escapeHtml(sub.name)}</span>
          <button class="icon-btn" data-action="st-add-child" data-sub="${sub.id}" title="Add dependency">+ sub</button>
          <button class="icon-btn" data-action="st-delete" data-sub="${sub.id}">✕</button>
        </div>`;
      (sub.children||[]).forEach(child => {
        html += `
          <div class="st-row child">
            <span class="mini-check ${child.done?'checked':''}" data-action="st-toggle" data-sub="${sub.id}" data-child="${child.id}">${child.done?'✓':''}</span>
            <span class="st-name-edit ${child.done?'subtask-name done':''}">${escapeHtml(child.name)}</span>
            <button class="icon-btn" data-action="st-delete" data-sub="${sub.id}" data-child="${child.id}">✕</button>
          </div>`;
      });
      if (modalAddChildFor === sub.id) {
        html += `<div class="st-child-add">
          <input type="text" id="stChildInput" placeholder="e.g. Make space on drive" autofocus>
        </div>`;
      }
    });
    html += `<div class="st-add-row">
      <input type="text" id="stNewInput" placeholder="Add a subtask, press Enter">
    </div>`;
    html += '</div>';
    el.innerHTML = html;

    el.querySelectorAll('[data-action="st-toggle"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const sub = modalSubtasks.find(s => s.id === btn.dataset.sub);
        if (!sub) return;
        if (btn.dataset.child) {
          const child = (sub.children||[]).find(c => c.id === btn.dataset.child);
          if (child) child.done = !child.done;
        } else {
          sub.done = !sub.done;
        }
        renderSubtaskEditor();
      });
    });
    el.querySelectorAll('[data-action="st-delete"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const sub = modalSubtasks.find(s => s.id === btn.dataset.sub);
        if (!sub) return;
        if (btn.dataset.child) {
          sub.children = (sub.children||[]).filter(c => c.id !== btn.dataset.child);
        } else {
          modalSubtasks = modalSubtasks.filter(s => s.id !== btn.dataset.sub);
        }
        renderSubtaskEditor();
      });
    });
    el.querySelectorAll('[data-action="st-add-child"]').forEach(btn => {
      btn.addEventListener('click', () => {
        modalAddChildFor = (modalAddChildFor === btn.dataset.sub) ? null : btn.dataset.sub;
        renderSubtaskEditor();
        const input = document.getElementById('stChildInput');
        if (input) input.focus();
      });
    });
    const childInput = document.getElementById('stChildInput');
    if (childInput) {
      childInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const v = e.target.value.trim();
          if (v) {
            const sub = modalSubtasks.find(s => s.id === modalAddChildFor);
            if (sub) {
              sub.children = sub.children || [];
              sub.children.push({ id: genId('sub'), name: v, done: false });
            }
          }
          modalAddChildFor = null;
          renderSubtaskEditor();
        } else if (e.key === 'Escape') {
          modalAddChildFor = null;
          renderSubtaskEditor();
        }
      });
    }
    const newInput = document.getElementById('stNewInput');
    newInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const v = e.target.value.trim();
        if (v) modalSubtasks.push({ id: genId('sub'), name: v, done: false, children: [] });
        renderSubtaskEditor();
        const again = document.getElementById('stNewInput');
        if (again) again.focus();
      }
    });
  }

  document.getElementById('addBtn').addEventListener('click', () => openModal(null));

  renderAll();
})();
</script>
</body>
</html>
